# ============================================================
# Prometheus Configuration - NFe Processing Platform
# ============================================================

global:
  scrape_interval: 15s      # Frequencia de coleta de metricas
  evaluation_interval: 15s  # Frequencia de avaliacao de regras

# ============================================================
# Scrape Configurations
# ============================================================
scrape_configs:

  # ----------------------------------------------------------
  # Prometheus (self-monitoring)
  # ----------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

